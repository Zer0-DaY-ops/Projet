<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact | Timéo François</title>
    <link rel="stylesheet" href="contact.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
  </head>
  <body>
    <header>
      <nav class="navbar">
        <div class="logo">
          <a href="/index/index.html">Timéo François<span>.</span></a>
        </div>
        <ul class="nav-links">
          <li><a href="/about/about.html">À propos</a></li>
          <li><a href="/coming-soon/coming-soon.html">Projets</a></li>
          <li><a href="/compétences/competences.html">Compétences</a></li>
          <li>
            <a href="/contact/Contact.html" class="btn-contact active"
              >Contact</a
            >
          </li>
        </ul>
      </nav>
    </header>

    <main class="container">
      <section class="contact-section">
        <div class="contact-grid">
          <div class="contact-form-container">
            <h1>Me Contacter</h1>
            <p class="subtitle">Travaillons ensemble.</p>

            <form class="contact-form">
              <div class="form-group">
                <label for="name">Nom</label>
                <input
                  type="text"
                  id="name"
                  name="name"
                  placeholder="Ton nom"
                />
              </div>
              <div class="form-group">
                <label for="email">Email professionnel</label>
                <input
                  type="email"
                  id="email"
                  name="email"
                  placeholder="ton@email.com"
                />
              </div>
              <div class="form-group">
                <label for="message">Message</label>
                <textarea
                  id="message"
                  name="message"
                  rows="5"
                  placeholder="Ton message..."
                ></textarea>
              </div>
              <button type="submit" class="btn-submit">Envoyer</button>
            </form>
          </div>

          <div class="contact-info">
            <div class="info-item">
              <i class="fab fa-discord"></i>
              <span>strongbob2.0</span>
            </div>
            <div class="info-item">
              <i class="fas fa-envelope"></i>
              <span>timfran134@gmail.com</span>
            </div>
            <div class="info-item">
              <i class="fas fa-location-dot"></i>
              <span>Lille, France</span>
            </div>

            <div class="social-icons">
              <a href="https://github.com/Zer0-DaY-ops"
                ><i class="fab fa-github"></i
              ></a>
              <a href="https://www.linkedin.com/in/tim%C3%A9o-francois/"
                ><i class="fab fa-linkedin-in"></i
              ></a>
            </div>
          </div>
        </div>
      </section>
    </main>

    <footer>
      <div class="footer-links">
        <a href="https://github.com/Zer0-DaY-ops">GitHub</a>
        <a href="https://www.linkedin.com/in/tim%C3%A9o-francois/">LinkedIn</a>
        <a href="/photo/cv_pro_T.F.pdf">CVs</a>
      </div>
    </footer>
  </body>
</html>
