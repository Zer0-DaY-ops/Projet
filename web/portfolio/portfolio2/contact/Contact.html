<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact | Timéo François</title>
    <link rel="stylesheet" href="contact.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
  </head>
  <body>
    <div class="zone-lucioles">
      <div class="luciole" style="top: 20%; left: 10%"></div>
      <div class="luciole" style="top: 60%; left: 80%"></div>
    </div>

    <header>
      <nav class="navigation">
        <div class="logo">
          <a href="/index/index.html">Timéo François<span>.</span></a>
        </div>
        <ul class="liens-navigation">
          <li><a href="/about/about.html">À propos</a></li>
          <li><a href="/coming-soon/coming-soon.html">Projets</a></li>
          <li><a href="/compétences/competences.html">Compétences</a></li>
          <li>
            <a href="Contact.html" class="bouton-contact active">Contact</a>
          </li>
        </ul>
      </nav>
    </header>

    <main class="conteneur">
      <section class="section-contact">
        <div class="point-lumineux p1"></div>
        <div class="point-lumineux p3"></div>

        <div class="grille-contact">
          <div class="bloc-formulaire">
            <h1>Me Contacter</h1>
            <p class="sous-titre">
              Un projet ? Une question ? Travaillons ensemble.
            </p>

            <form class="formulaire-contact">
              <div class="groupe-champ">
                <label for="name">NOM COMPLET</label>
                <input
                  type="text"
                  id="name"
                  name="name"
                  placeholder="Ton nom"
                  required
                />
              </div>
              <div class="groupe-champ">
                <label for="email">EMAIL PROFESSIONNEL</label>
                <input
                  type="email"
                  id="email"
                  name="email"
                  placeholder="ton@email.com"
                  required
                />
              </div>
              <div class="groupe-champ">
                <label for="message">MESSAGE</label>
                <textarea
                  id="message"
                  name="message"
                  rows="5"
                  placeholder="Parle-moi de ton projet..."
                  required
                ></textarea>
              </div>
              <button type="submit" class="bouton-envoi">
                ENVOYER LE MESSAGE
              </button>
            </form>
          </div>

          <div class="infos-contact">
            <div class="element-info">
              <i class="fab fa-discord"></i>
              <span>strongbob2.0</span>
            </div>
            <div class="element-info">
              <i class="fas fa-envelope"></i>
              <span>timfran134@gmail.com</span>
            </div>
            <div class="element-info">
              <i class="fas fa-location-dot"></i>
              <span>Lille, France</span>
            </div>

            <div class="icones-sociaux">
              <a href="https://github.com/Zer0-DaY-ops" target="_blank"
                ><i class="fab fa-github"></i
              ></a>
              <a
                href="https://www.linkedin.com/in/timéo-francois/"
                target="_blank"
                ><i class="fab fa-linkedin-in"></i
              ></a>
            </div>
          </div>
        </div>
      </section>
    </main>

    <footer>
      <div class="liens-footer">
        <a href="https://github.com/Zer0-DaY-ops" target="_blank">
          <i class="fab fa-github"></i> GitHub
        </a>
        <a href="https://www.linkedin.com/in/timéo-francois/" target="_blank">
          <i class="fab fa-linkedin-in"></i> LinkedIn
        </a>
        <a href="/photo/cv_pro_T.F.pdf" target="_blank">
          <i class="far fa-file-pdf"></i> CV (FR)
        </a>
        <a href="/photo/cv_pro_T.F.pdf" target="_blank">
          <i class="far fa-file-pdf"></i> CV (EN)
        </a>
      </div>
    </footer>
  </body>
</html>
